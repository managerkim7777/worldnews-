<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WORLDNEWS — 세계 속보</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #1e1e1e;
      --text: #e8e8e8;
      --muted: #555;
      --accent: #ff2d2d;
      --orange: #ff7a00;
      --yellow: #f5c518;
      --green: #00c853;
      --blue: #2979ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      position: sticky;
      top: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      z-index: 100;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 4px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    #clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    #refresh-btn {
      background: var(--accent);
      color: white;
      border: none;
      padding: 7px 16px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity 0.2s;
    }
    #refresh-btn:hover { opacity: 0.8; }
    #refresh-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── TICKER ── */
    .ticker-wrap {
      background: var(--accent);
      overflow: hidden;
      height: 32px;
      display: flex;
      align-items: center;
    }
    .ticker-label {
      background: #000;
      color: var(--accent);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 2px;
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ticker-track {
      display: flex;
      animation: ticker 60s linear infinite;
      white-space: nowrap;
    }
    .ticker-track span {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
      padding: 0 40px 0 0;
      color: white;
    }
    @keyframes ticker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ── FILTERS ── */
    .filters {
      padding: 16px 32px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-right: 4px;
    }
    .filter-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'Noto Sans KR', sans-serif;
      border-radius: 2px;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }
    .filter-btn.f-red.active  { background: var(--accent); border-color: var(--accent); color: white; }
    .filter-btn.f-orange.active { background: var(--orange); border-color: var(--orange); color: white; }
    .filter-btn.f-yellow.active { background: var(--yellow); border-color: var(--yellow); color: #000; }

    /* ── STATS BAR ── */
    .stats {
      padding: 10px 32px;
      display: flex;
      gap: 24px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      border-bottom: 1px solid var(--border);
    }
    .stats b { color: var(--text); }

    /* ── GRID ── */
    .grid {
      padding: 24px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 1px;
      background: var(--border);
    }

    /* ── CARD ── */
    .card {
      background: var(--surface);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: background 0.15s;
      animation: fadeIn 0.4s ease both;
      cursor: pointer;
    }
    .card:hover { background: #161616; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: space-between;
    }

    .grade-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 2px;
      white-space: nowrap;
    }
    .grade-최긴급 { background: var(--accent); color: white; }
    .grade-긴급   { background: var(--orange); color: white; }
    .grade-주요   { background: var(--yellow); color: #000; }
    .grade-일반   { background: #222; color: var(--muted); }

    .source-tag {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 2px;
    }

    .score-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot-최긴급 { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    .dot-긴급   { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
    .dot-주요   { background: var(--yellow); }
    .dot-일반   { background: var(--muted); }

    .title-ko {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.5;
      color: var(--text);
    }
    .title-ko.loading {
      color: var(--muted);
      font-weight: 400;
      font-style: italic;
    }

    .title-en {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 4px;
    }

    .card-link {
      font-size: 11px;
      color: var(--blue);
      text-decoration: none;
      font-family: 'JetBrains Mono', monospace;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-link:hover { text-decoration: underline; }

    .card-score {
      font-size: 10px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── LOADING / EMPTY ── */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px;
      gap: 16px;
      color: var(--muted);
    }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    footer {
      padding: 24px 32px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      header, .filters, .stats, .grid, footer { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: 1fr; }
      .logo { font-size: 22px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">WORLD<span>NEWS</span></div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <button id="refresh-btn" onclick="loadAll()">⟳ 새로고침</button>
  </div>
</header>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-label">LIVE</div>
  <div id="ticker-inner" style="overflow:hidden;flex:1;display:flex;align-items:center;">
    <div class="ticker-track" id="ticker-track">
      <span>뉴스를 불러오는 중...</span>
    </div>
  </div>
</div>

<!-- FILTERS -->
<div class="filters">
  <span class="filter-label">필터</span>
  <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
  <button class="filter-btn f-red" onclick="setFilter('최긴급', this)">🔴 최긴급</button>
  <button class="filter-btn f-orange" onclick="setFilter('긴급', this)">🟠 긴급</button>
  <button class="filter-btn f-yellow" onclick="setFilter('주요', this)">🟡 주요</button>
</div>

<!-- STATS -->
<div class="stats" id="stats">
  <span>수집 대기 중...</span>
</div>

<!-- GRID -->
<div class="grid" id="grid">
  <div class="loading-screen" style="grid-column:1/-1">
    <div class="spinner"></div>
    <span>세계 뉴스를 수집하고 번역 중...</span>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <span>WORLDNEWS — 자동 속보 번역</span>
  <span id="last-update">마지막 업데이트: —</span>
</footer>

<script>
// ── 설정 ──────────────────────────────────────────────────────
const RSS_FEEDS = [
  { name: "BBC",        url: "https://feeds.bbci.co.uk/news/world/rss.xml" },
  { name: "Reuters",    url: "https://feeds.reuters.com/reuters/worldNews" },
  { name: "Al Jazeera",url: "https://www.aljazeera.com/xml/rss/all.xml" },
  { name: "Guardian",   url: "https://www.theguardian.com/world/rss" },
  { name: "CNN",        url: "http://rss.cnn.com/rss/edition_world.rss" },
  { name: "AP",         url: "https://rsshub.app/apnews/topics/apf-topnews" },
];

const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";
const TRANSLATE_API = "https://api.mymemory.translated.net/get?langpair=en|ko&q=";

const SCORE_TABLE = {
  breaking:10, urgent:10, emergency:10, nuclear:10, war:10,
  invasion:10, assassination:10, coup:10, attack:8,
  killed:7, dead:7, explosion:7, missile:7, strike:7,
  earthquake:7, tsunami:7, shooting:7, hostage:7, ceasefire:7,
  crisis:5, conflict:5, casualties:6, troops:5, collapse:5,
  riot:5, sanctions:6, election:4, president:4, summit:4,
  arrest:4, protest:4, flood:4, collapse:5, resign:4,
  military:4, tariff:4, treaty:4, forces:3, fire:3,
  gaza:5, ukraine:5, taiwan:5, iran:4, "north korea":5,
  israel:4, russia:4, china:3, nato:4,
};

function scoreNews(title) {
  const t = title.toLowerCase();
  let score = 0;
  for (const [kw, pts] of Object.entries(SCORE_TABLE)) {
    if (t.includes(kw)) score += pts;
  }
  return score;
}

function getGrade(score) {
  if (score >= 15) return "최긴급";
  if (score >= 8)  return "긴급";
  if (score >= 4)  return "주요";
  return "일반";
}

function gradeLabel(g) {
  return { "최긴급":"🔴 최긴급", "긴급":"🟠 긴급", "주요":"🟡 주요", "일반":"⚪ 일반" }[g];
}

// ── 상태 ──────────────────────────────────────────────────────
let allNews = [];
let currentFilter = "all";
const seenUrls = new Set(JSON.parse(localStorage.getItem("seenUrls") || "[]"));

// ── RSS 수집 ──────────────────────────────────────────────────
async function fetchFeed(feed) {
  try {
    const res = await fetch(RSS2JSON + encodeURIComponent(feed.url));
    const data = await res.json();
    if (!data.items) return [];
    return data.items.slice(0, 6).map(item => ({
      source: feed.name,
      title: item.title?.trim() || "",
      url: item.link || "",
      pubDate: item.pubDate || "",
    }));
  } catch {
    return [];
  }
}

// ── 번역 ──────────────────────────────────────────────────────
async function translate(text) {
  try {
    const res = await fetch(TRANSLATE_API + encodeURIComponent(text.slice(0, 400)));
    const data = await res.json();
    return data.responseData?.translatedText || text;
  } catch {
    return text;
  }
}

// ── 렌더 카드 ─────────────────────────────────────────────────
function renderCard(item, idx) {
  const grade = item.grade;
  const delay = (idx % 20) * 40;
  return `
    <div class="card" style="animation-delay:${delay}ms" onclick="window.open('${item.url}','_blank')">
      <div class="card-top">
        <span class="grade-badge grade-${grade}">${gradeLabel(grade)}</span>
        <span class="source-tag">${item.source}</span>
        <span class="score-dot dot-${grade}"></span>
      </div>
      <div class="title-ko ${item.titleKo ? '' : 'loading'}" id="ko-${idx}">
        ${item.titleKo || "번역 중..."}
      </div>
      <div class="title-en">${item.title}</div>
      <div class="card-footer">
        <a class="card-link" href="${item.url}" target="_blank" onclick="event.stopPropagation()">
          ↗ 원문 보기
        </a>
        <span class="card-score">score: ${item.score}</span>
      </div>
    </div>
  `;
}

// ── 필터 ──────────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderGrid();
}

function renderGrid() {
  const filtered = currentFilter === "all"
    ? allNews
    : allNews.filter(n => n.grade === currentFilter);

  const grid = document.getElementById("grid");
  if (!filtered.length) {
    grid.innerHTML = `<div class="loading-screen" style="grid-column:1/-1"><span>해당 등급의 뉴스가 없습니다.</span></div>`;
    return;
  }
  grid.innerHTML = filtered.map((n, i) => renderCard(n, i)).join("");
}

// ── 티커 업데이트 ─────────────────────────────────────────────
function updateTicker(news) {
  const urgent = news.filter(n => n.grade === "최긴급" || n.grade === "긴급");
  const items = (urgent.length ? urgent : news).slice(0, 10);
  const text = items.map(n => `▶ [${n.source}] ${n.titleKo || n.title}`).join("　　　　");
  const doubled = text + "　　　　　　" + text;
  const track = document.getElementById("ticker-track");
  track.innerHTML = `<span>${doubled}</span>`;
}

// ── 통계 업데이트 ─────────────────────────────────────────────
function updateStats(news) {
  const counts = { 최긴급: 0, 긴급: 0, 주요: 0, 일반: 0 };
  news.forEach(n => counts[n.grade]++);
  document.getElementById("stats").innerHTML = `
    <span>총 <b>${news.length}</b>건</span>
    <span>🔴 최긴급 <b>${counts["최긴급"]}</b></span>
    <span>🟠 긴급 <b>${counts["긴급"]}</b></span>
    <span>🟡 주요 <b>${counts["주요"]}</b></span>
    <span style="color:#333">소스: BBC·Reuters·Al Jazeera·Guardian·CNN·AP</span>
  `;
}

// ── 메인 로드 ─────────────────────────────────────────────────
async function loadAll() {
  const btn = document.getElementById("refresh-btn");
  btn.disabled = true;
  btn.textContent = "수집 중...";

  document.getElementById("grid").innerHTML = `
    <div class="loading-screen" style="grid-column:1/-1">
      <div class="spinner"></div>
      <span>뉴스를 수집하고 있어요...</span>
    </div>`;

  // 모든 피드 병렬 수집
  const results = await Promise.all(RSS_FEEDS.map(fetchFeed));
  let raw = results.flat();

  // 중복 제거
  const seen = new Set();
  raw = raw.filter(n => {
    if (!n.url || seen.has(n.url)) return false;
    seen.add(n.url);
    return true;
  });

  // 채점 + 일반 제외
  let scored = raw
    .map(n => ({ ...n, score: scoreNews(n.title), grade: getGrade(scoreNews(n.title)) }))
    .filter(n => n.grade !== "일반")
    .sort((a, b) => b.score - a.score);

  allNews = scored;
  renderGrid();
  updateStats(scored);
  document.getElementById("last-update").textContent =
    "마지막 업데이트: " + new Date().toLocaleTimeString("ko-KR");
  btn.disabled = false;
  btn.textContent = "⟳ 새로고침";

  // 번역 순차 처리 (API 과부하 방지)
  for (let i = 0; i < scored.length; i++) {
    const item = scored[i];
    if (!item.titleKo) {
      item.titleKo = await translate(item.title);
      // 화면에서 해당 카드만 업데이트
      const el = document.getElementById(`ko-${i}`);
      if (el) {
        el.textContent = item.titleKo;
        el.classList.remove("loading");
      }
    }
    await new Promise(r => setTimeout(r, 200)); // 0.2초 간격
  }

  updateTicker(scored);
}

// ── 시계 ──────────────────────────────────────────────────────
function updateClock() {
  document.getElementById("clock").textContent =
    new Date().toLocaleTimeString("ko-KR", { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// ── 자동 새로고침 30분 ────────────────────────────────────────
setInterval(loadAll, 30 * 60 * 1000);

// ── 시작 ──────────────────────────────────────────────────────
loadAll();
</script>
</body>
</html>
